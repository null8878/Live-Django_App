{% extends 'blog/base.html' %}

{% block content %}
    <h1>Django Girls Blog</h1>
    {% for post in posts %}
        <div>
            <h2><a href="{% url 'post_detail' pk=post.pk %}">{{ post.title }}</a></h2>
            <p>{{ post.text|linebreaksbr }}</p>
            <small>Published: {{ post.published_date }}</small>
        </div>
    {% endfor %}
{% endblock %}
